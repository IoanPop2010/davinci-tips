        <h1>Color Grading Secrets</h1>
        <div class="tip">
            <h2>Color Space Transform (CST)</h2>
            <p>Folosește CST în loc de LUT-uri pentru o conversie mai precisă de la LOG la Rec.709.</p>
        </div>
        <div class="tip">
            <h2>Parallel Nodes (Alt+P)</h2>
            <p>Permit mixarea culorilor fără ca un nod să limiteze informația nodului următor.</p>
        </div>
