<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church Beast Configurator - DVR Tips</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .config-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 100px; }
        .config-section { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #2d2d2d; }
        select { 
            width: 100%; padding: 12px; background: #050608; color: white; 
            border: 1px solid #2d2d2d; border-radius: 5px; cursor: pointer; margin-top: 10px;
        }
        .total-sticky {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #6c5ce7;
            padding: 20px; text-align: center; z-index: 1000; box-shadow: 0 -5px 25px rgba(0,0,0,0.7);
        }
        .total-sticky h2 { margin: 0; font-size: 2rem; color: white; }
        label { font-weight: bold; color: var(--accent); display: block; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">DVR Tips</a>
            <div class="links">
                <a href="index.html">Home</a>
                <a href="configurator.html">Configurator</a>
                <a href="echipament.html">Echipament</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <main>
        <h1>Church Beast Mode Configurator</h1>
        <p>Configurație completă pentru transmisiuni multi-cam, ecrane LED și sunet pro.</p>

        <div class="config-grid">
            <div class="config-section">
                <label>1. Sistem Camere (Captură)</label>
                <select class="calc" id="camere">
                    <option value="15000">4x Blackmagic Studio 4K Pro G2 + Obiective Leica - 15.000 €</option>
                    <option value="28000">3x Blackmagic URSA Broadcast G2 (Beast Setup) - 28.000 €</option>
                    <option value="6000">3x Camere PTZ 4K (Control de la distanță) - 6.000 €</option>
                </select>
            </div>

            <div class="config-section">
                <label>2. Regie Video (Switcher)</label>
                <select class="calc" id="switcher">
                    <option value="10500">ATEM 2 M/E Constellation 4K + Advanced Panel 10 - 10.500 €</option>
                    <option value="4500">ATEM 1 M/E Constellation 4K + Panel mic - 4.500 €</option>
                    <option value="1500">ATEM SDI Extreme ISO (Compact) - 1.500 €</option>
                </select>
            </div>

            <div class="config-section">
                <label>3. Infrastructură IP 2110</label>
                <select class="calc" id="ip">
                    <option value="3500">Full IP: 4x 2110 IP Converters + Switch 10Gb - 3.500 €</option>
                    <option value="800">Sistem Clasic: SDI Patch Panel + Converters - 800 €</option>
                </select>
            </div>

            <div class="config-section">
                <label>4. Stație Editare & Streaming</label>
                <select class="calc" id="pc">
                    <option value="5500">Mac Studio M3 Ultra + DeckLink 8K Pro - 5.500 €</option>
                    <option value="3000">PC vMix Pro (RTX 4090) - 3.000 €</option>
                </select>
            </div>

            <div class="config-section">
                <label>5. Cablaj, Rack & Alimentare</label>
                <select class="calc" id="cabluri">
                    <option value="4000">Beast Kit: 500m Cablu Fibra, Rack 24U, UPS Online - 4.000 €</option>
                    <option value="1500">Standard: 200m SDI, Rack 12U, PDU - 1.500 €</option>
                </select>
            </div>
        </div>

        <div class="total-sticky">
            <p style="margin:0; font-weight:bold; text-transform:uppercase; font-size:0.8rem;">Investiție Totală Estimată</p>
            <h2 id="total-price">0 €</h2>
        </div>
    </main>

    <script>
        function updatePrice() {
            let total = 0;
            document.querySelectorAll('.calc').forEach(select => {
                total += parseInt(select.value);
            });
            document.getElementById('total-price').innerText = total.toLocaleString('ro-RO') + ' €';
        }

        document.querySelectorAll('.calc').forEach(s => s.addEventListener('change', updatePrice));
        window.onload = updatePrice;
    </script>
</body>
</html>
