<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurator - DVR Tips</title>
    <link rel="stylesheet" href="style.css">
    <style>
        select { width: 100%; padding: 12px; background: #000; color: white; border: 1px solid var(--border); border-radius: 4px; margin-top: 10px; cursor: pointer; }
        select:hover { border-color: var(--accent); }
        .total-box { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--accent); padding: 20px; text-align: center; border-top: 3px solid #000; }
        .total-box h2 { color: #000; margin: 0; font-size: 2rem; font-weight: 900; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Dave's Tips</a>
            <div class="links">
                <a href="index.html">Home</a>
                <a href="configurator.html">Configurator</a>
                <a href="echipament.html">Echipament</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <main style="margin-bottom: 150px;">
        <h1 style="text-align: center; margin: 40px 0;">Beast Church Configurator</h1>

        <div class="tip-card">
            <h2>Pachet Camere</h2>
            <select class="calc" onchange="updatePrice()">
                <option value="0">NONE - 0 €</option>
                <option value="11500">Pro-Streamer IP (4x Studio 4K + Lumix) - 11.500 €</option>
                <option value="18500">Cinematic Elite (4x Studio 6K + Sigma) - 18.500 €</option>
            </select>
        </div>

        <div class="tip-card">
            <h2>Regie & Switcher</h2>
            <select class="calc" onchange="updatePrice()">
                <option value="0">NONE - 0 €</option>
                <option value="4100">ATEM 2 M/E Constellation 4K - 4.100 €</option>
                <option value="3800">ATEM Television Studio HD8 ISO - 3.800 €</option>
            </select>
        </div>

        <div class="tip-card">
            <h2>Workstation vMix</h2>
            <select class="calc" onchange="updatePrice()">
                <option value="0">NONE - 0 €</option>
                <option value="4800">Mac Studio M3 Ultra - 4.800 €</option>
                <option value="3500">PC Custom (i9 + RTX 3080) - 3.500 €</option>
            </select>
        </div>
    </main>

    <div class="total-box">
        <h2 id="total-price">0 €</h2>
    </div>

    <script>
        function updatePrice() {
            let total = 0;
            document.querySelectorAll('.calc').forEach(s => total += parseInt(s.value));
            document.getElementById('total-price').innerText = total.toLocaleString('ro-RO') + ' €';
        }
    </script>
</body>
</html>
