<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - DVR Tips</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">DVR Tips</a>
            <div class="links">
                <a href="index.html">Home</a>
                <a href="edit.html">Editing</a>
                <a href="color.html">Color</a>
                <a href="echipament.html">Echipament</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="tip">
            <h2>Contactează-ne</h2>
            <p>Ai o întrebare despre Rack sau DaVinci? Trimite un mesaj.</p>
            
            <form name="contact-studio" method="POST" data-netlify="true">
                <input type="hidden" name="form-name" value="contact-studio" />
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px;">Nume:</label>
                    <input type="text" name="nume" required style="width:100%; padding:10px; border-radius:5px; border:1px solid #2d2d2d; background:#050608; color:white;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px;">Email:</label>
                    <input type="email" name="email" required style="width:100%; padding:10px; border-radius:5px; border:1px solid #2d2d2d; background:#050608; color:white;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px;">Mesaj:</label>
                    <textarea name="mesaj" required style="width:100%; height:100px; padding:10px; border-radius:5px; border:1px solid #2d2d2d; background:#050608; color:white;"></textarea>
                </div>
                <button type="submit" style="background:var(--accent); color:white; border:none; padding:12px 25px; border-radius:5px; cursor:pointer; font-weight:bold;">
                    Trimite Mesajul
                </button>
            </form>
        </section>
    </main>
</body>
</html>
